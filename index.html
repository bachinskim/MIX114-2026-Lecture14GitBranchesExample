<!DOCTYPE html>
<html>
    <head>
        <title>
            Branches example
        </title>
    </head>
<body>
    <h1>The new first paragraph version 2</h1>
    <p>Some text in the first paragraph</p>
    <p>Added paragraph in branch 2</p>
    <div><ul>
        <li>Item 1 in version 2</li>
        <li>Item 2 in version 2</li>
    </ul></div>
    <div><p>Code from version 1 branch</p></div>
    <table>
        <tr>
            <td>Cell 1</td>
            <td>Cell 2</td>
        </tr>
        <tr>
            <td>Cell 3</td>
            <td>Cell 4</td>
        </tr>
    </table>
    <h2>
        Another section in version 2
    </h2>
</body>
</html>
