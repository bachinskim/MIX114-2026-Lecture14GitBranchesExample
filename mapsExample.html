<!DOCTYPE html>
<html>
<head>
  <title>Map - Media City Bergen</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    async function initMap() {
      const mediaCityBergen = {
        lat: 60.3854,
        lng: 5.3328
      };

      const universityMuseumBergen = {
      lat: 60.38765,
      lng: 5.32156
    };
    const path = [{lat: 60.38701225132832, lng: 5.331814965814117}, {lat: 60.386116915012316, lng: 5.328572641558259}];

      const { Map } = await google.maps.importLibrary("maps");
      const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

      const map = new Map(document.getElementById("map"), {
        center: mediaCityBergen,
        zoom: 16,
        mapId: "cf8e05a83868fcf1fc6f35be"
      });

      new AdvancedMarkerElement({
        map,
        position: mediaCityBergen,
        title: "Media City Bergen"
      });

      new AdvancedMarkerElement({
      map,
      position: universityMuseumBergen,
      title: "University Museum of Bergen"
    });

      addPolylineBetweenPlaces(map, mediaCityBergen, universityMuseumBergen, path);

      const uibHoydenBuildingsGeoJson = {
  type: "FeatureCollection",
  features: [
    {
      type: "Feature",
      properties: {
        name: "Example UiB Building",
        owner: "UiB",
        area: "Høyden"
      },
      geometry: {
        type: "Polygon",
        coordinates: [
          [
            [5.32190, 60.38810],
            [5.32220, 60.38810],
            [5.32220, 60.38790],
            [5.32190, 60.38790],
            [5.32190, 60.38810]
          ]
        ]
      }
    }
  ]
};
      displayShadedUiBBuildingsOnHoyden(map, uibHoydenBuildingsGeoJson);
    }

    function addPolylineBetweenPlaces(map, startPosition, endPosition, path) {
    const polyline = new google.maps.Polyline({
      path: [startPosition, path[0], path[1], endPosition],
      geodesic: true,
      strokeColor: "#2563eb",
      strokeOpacity: 1.0,
      strokeWeight: 4
    });

    polyline.setMap(map);

    return polyline;
  }

  function displayShadedUiBBuildingsOnHoyden(map, geoJsonData) {
  // Add UiB building footprint polygons to the map
  map.data.addGeoJson(geoJsonData);

  // Style only features marked as UiB buildings on Høyden
  map.data.setStyle((feature) => {
    const isUiBBuilding = feature.getProperty("owner") === "UiB";
    const isHoyden = feature.getProperty("area") === "Høyden";

    if (isUiBBuilding && isHoyden) {
      return {
        fillColor: "#005aa7",
        fillOpacity: 0.35,
        strokeColor: "#003f73",
        strokeOpacity: 0.9,
        strokeWeight: 2
      };
    }

    // Hide all other polygons in this dataset
    return {
      visible: false
    };
  });
}
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA7cxvaPm0bclaSw_mqM3GUCNMPCdR7Vp0&loading=async&callback=initMap"
    async
    defer>
  </script>
</body>
</html>
